server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip basico
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API, admin (/_/) e realtime do PocketBase -> container pocketbase.
    # `proxy_buffering off` e read_timeout longo sao necessarios para o
    # realtime (SSE) das telas que atualizam sozinhas.
    location ~ ^/(api|_)/ {
        proxy_pass http://pocketbase:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        client_max_body_size 25m; # uploads (ex.: exames/anexos)
    }

    # SPA: qualquer rota do React cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
